<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Vidya — Karnataka SSLC AI Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — Warm Indian educational palette
═══════════════════════════════════════════════ */
:root {
  /* Light theme */
  --bg:          #f7f3ee;
  --bg2:         #efe9e0;
  --surface:     #ffffff;
  --surface2:    #faf7f3;
  --border:      #e2d9ce;
  --border2:     #cec3b5;
  --ink:         #1c1510;
  --ink2:        #3d3028;
  --ink3:        #6b5a48;
  --muted:       #9c8b7a;
  --muted2:      #bfb0a0;
  /* Brand */
  --saffron:     #e8720c;
  --saffron-d:   #c45e08;
  --saffron-l:   #fff4eb;
  --saffron-glow:rgba(232,114,12,.18);
  --gold:        #d4900a;
  --gold-l:      #fffbf0;
  --green:       #1a7a3c;
  --green-l:     #edf7f2;
  --red:         #c42020;
  --red-l:       #fdf0f0;
  --blue:        #1a5cb8;
  --blue-l:      #eff4fd;
  --violet:      #6b2db8;
  --violet-l:    #f3eefb;
  /* Sidebar */
  --sidebar-bg:  #1c1510;
  --sidebar-icon:#a89885;
  --sidebar-active:#e8720c;
  /* Font */
  --font: 'Sora', system-ui, sans-serif;
  --mono: 'DM Mono', 'Courier New', monospace;
  /* Radius */
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;--r999:999px;
  /* Shadow */
  --sh-sm:0 1px 4px rgba(0,0,0,.07);
  --sh-md:0 4px 20px rgba(0,0,0,.09);
  --sh-lg:0 12px 48px rgba(0,0,0,.12);
  --t:.15s ease;
}
[data-theme="dark"] {
  --bg:          #111009;
  --bg2:         #1a1712;
  --surface:     #211e18;
  --surface2:    #2a2620;
  --border:      #3a352d;
  --border2:     #4a443a;
  --ink:         #f5f0e8;
  --ink2:        #d4c9b8;
  --ink3:        #a89885;
  --muted:       #7a6d5e;
  --muted2:      #5a5048;
  --saffron-l:   #2a1a08;
  --gold-l:      #1c1508;
  --green-l:     #0a1c10;
  --red-l:       #1c0808;
  --blue-l:      #0a1228;
  --violet-l:    #160a28;
  --sh-sm:0 1px 4px rgba(0,0,0,.3);
  --sh-md:0 4px 20px rgba(0,0,0,.4);
  --sh-lg:0 12px 48px rgba(0,0,0,.5);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  transition:background .3s,color .3s;
}

/* ═══════════════════════════════════════════════
   NAME MODAL — first visit only
═══════════════════════════════════════════════ */
#nameModal {
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  background:rgba(28,21,16,.7);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  animation:fadeIn .3s ease;
}
#nameModal.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-card {
  background:var(--surface);
  border-radius:var(--r24);
  padding:40px 36px;
  width:100%;max-width:420px;
  box-shadow:var(--sh-lg);
  animation:slideUp .35s cubic-bezier(.34,1.56,.64,1);
  border:1.5px solid var(--border);
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.modal-logo{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--saffron),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 20px;
  box-shadow:0 8px 24px var(--saffron-glow);
}
.modal-title{font-size:22px;font-weight:800;text-align:center;color:var(--ink);margin-bottom:6px;letter-spacing:-.03em}
.modal-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.5}
.modal-input {
  width:100%;border:1.5px solid var(--border2);border-radius:var(--r12);
  padding:13px 16px;font-size:15px;font-family:var(--font);
  color:var(--ink);background:var(--bg2);
  outline:none;transition:border-color var(--t),box-shadow var(--t);
  margin-bottom:14px;
}
.modal-input::placeholder{color:var(--muted2)}
.modal-input:focus{border-color:var(--saffron);box-shadow:0 0 0 3px var(--saffron-glow);background:var(--surface)}
.modal-btn {
  width:100%;padding:14px;border-radius:var(--r12);border:none;
  background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;
  font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;
  box-shadow:0 4px 20px var(--saffron-glow);transition:all var(--t);letter-spacing:-.01em;
}
.modal-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--saffron-glow)}
.modal-badges{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:16px}
.mbadge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--r999);
  background:var(--bg2);color:var(--muted);border:1px solid var(--border)}

/* ═══════════════════════════════════════════════
   APP SHELL — Top bar + 3 columns
═══════════════════════════════════════════════ */
#app {
  display:flex;flex-direction:column;height:100%;
}

/* ── TOP BAR ─────────────────────────────── */
.topbar {
  height:54px;flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:16px;
  box-shadow:var(--sh-sm);
  position:relative;z-index:10;
}
.tb-brand {
  display:flex;align-items:center;gap:10px;
}
.tb-logo-mark {
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--saffron),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
  box-shadow:0 2px 8px var(--saffron-glow);
}
.tb-title {
  font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.04em;
}
.tb-title span{color:var(--saffron)}
.tb-tagline {
  font-size:11px;color:var(--muted);font-weight:500;
  background:var(--bg2);padding:2px 8px;border-radius:var(--r999);
  border:1px solid var(--border);white-space:nowrap;
}
.tb-right {
  display:flex;align-items:center;gap:10px;
}
.user-chip {
  display:flex;align-items:center;gap:8px;cursor:pointer;
  padding:5px 12px 5px 5px;border-radius:var(--r999);
  background:var(--bg2);border:1.5px solid var(--border);
  transition:all var(--t);
}
.user-chip:hover{border-color:var(--saffron);background:var(--saffron-l)}
.user-av {
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--saffron),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;
}
.user-name {
  font-size:13px;font-weight:600;color:var(--ink2);
  max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
/* Theme toggle */
.theme-toggle {
  width:38px;height:38px;border-radius:var(--r8);
  border:1.5px solid var(--border);background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all var(--t);font-size:17px;
  color:var(--ink3);
}
.theme-toggle:hover{border-color:var(--saffron);background:var(--saffron-l);color:var(--saffron)}
/* Req badge */
.req-badge {
  font-size:11px;font-weight:600;padding:4px 10px;
  border-radius:var(--r999);border:1px solid;
  white-space:nowrap;display:none;
}

/* ── 3-COLUMN BODY ───────────────────────── */
.body-wrap {
  flex:1;overflow:hidden;display:flex;
}

/* ── LEFT SIDEBAR — subjects ─────────────── */
.sidebar {
  width:82px;flex-shrink:0;
  background:var(--sidebar-bg);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:6px;
  overflow-y:auto;
  scrollbar-width:none;
}
.sidebar::-webkit-scrollbar{display:none}
.subject-btn {
  width:58px;height:58px;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;border:none;
  background:rgba(255,255,255,.06);
  color:var(--sidebar-icon);
  transition:all .2s ease;
  position:relative;
}
.subject-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.subject-btn.active{
  background:var(--saffron);
  color:#fff;
  box-shadow:0 4px 16px rgba(232,114,12,.4);
}
.subject-btn.active .sb-label{color:#fff}
.sb-icon{font-size:22px;line-height:1}
.sb-label{font-size:9px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:var(--sidebar-icon);text-align:center}
.subject-btn.active .sb-label{color:#fff}
.sb-divider{width:32px;height:1px;background:rgba(255,255,255,.1);margin:4px 0;flex-shrink:0}
/* Active indicator dot */
.subject-btn.active::before{
  content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);
  width:3px;height:24px;border-radius:0 3px 3px 0;
  background:var(--saffron);
}

/* ── CHAT PANEL — middle ─────────────────── */
.chat-panel {
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  background:var(--bg);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
}

/* Feature tab bar */
.feat-tabs {
  display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;padding:0 16px;
}
.ftab {
  padding:9px 14px;font-size:12.5px;font-weight:600;
  color:var(--muted);border:none;background:none;cursor:pointer;
  font-family:var(--font);border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all var(--t);
}
.ftab:hover{color:var(--ink)}
.ftab.active{color:var(--saffron);border-bottom-color:var(--saffron)}

/* Tab panels */
.tab-panel{flex:1;overflow:hidden;display:none;flex-direction:column}
.tab-panel.active{display:flex}

/* Chat scroll */
.chat-scroll {
  flex:1;overflow-y:auto;padding:24px 20px;
  scroll-behavior:smooth;
}
.chat-scroll::-webkit-scrollbar{width:4px}
.chat-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.msgs-inner {
  max-width:700px;margin:0 auto;
  display:flex;flex-direction:column;gap:0;
}

/* Messages */
.msg-row{display:flex;gap:12px;padding:14px 0;animation:msgIn .2s ease}
.msg-row.user{justify-content:flex-end}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.bot-av {
  width:32px;height:32px;border-radius:10px;flex-shrink:0;margin-top:2px;
  background:linear-gradient(135deg,var(--saffron),var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 2px 8px var(--saffron-glow);
}
.msg-content{flex:1;min-width:0;max-width:640px}
.msg-sender{font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.msg-text{font-size:14px;line-height:1.78;color:var(--ink)}
.msg-text p{margin-bottom:8px}
.msg-text p:last-child{margin-bottom:0}
.msg-text code{font-family:var(--mono);font-size:12px;background:var(--bg2);padding:2px 6px;border-radius:4px;color:var(--saffron-d)}
.msg-text pre{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r12);padding:14px 16px;margin:10px 0;overflow-x:auto;font-family:var(--mono);font-size:12px;color:var(--ink2);line-height:1.6}
.msg-text strong{color:var(--ink);font-weight:700}
.msg-text hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.msg-actions{display:flex;gap:5px;margin-top:6px;opacity:0;transition:opacity var(--t)}
.msg-row:hover .msg-actions{opacity:1}
.msg-action-btn{padding:3px 8px;border-radius:var(--r8);border:1px solid var(--border);
  background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:all var(--t)}
.msg-action-btn:hover{border-color:var(--saffron);color:var(--saffron)}

/* User bubble */
.user-msg-wrap{display:flex;flex-direction:column;align-items:flex-end;max-width:75%}
.user-bubble {
  background:linear-gradient(135deg,var(--saffron),var(--gold));
  color:#fff;border-radius:18px 18px 4px 18px;
  padding:11px 16px;font-size:14px;line-height:1.6;
  box-shadow:0 3px 14px var(--saffron-glow);
  word-break:break-word;
}

/* Quick chips */
.chips-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.chip{
  font-size:12px;font-weight:600;padding:6px 13px;border-radius:var(--r999);
  border:1.5px solid var(--border2);background:var(--surface);color:var(--ink3);
  cursor:pointer;font-family:var(--font);transition:all var(--t);
}
.chip:hover{background:var(--saffron);color:#fff;border-color:var(--saffron);transform:translateY(-1px)}

/* Typing */
.typing-row{display:flex;gap:12px;padding:14px 0}
.typing-bub{flex:1;max-width:640px}
.typing-inner{display:flex;flex-direction:column;gap:8px}
.typing-dots{display:flex;gap:5px;align-items:center}
.td{width:7px;height:7px;border-radius:50%;animation:tdb 1.1s infinite}
.td:nth-child(1){background:var(--saffron);animation-delay:0ms}
.td:nth-child(2){background:var(--gold);animation-delay:160ms}
.td:nth-child(3){background:var(--green);animation-delay:320ms}
@keyframes tdb{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}
.typing-msg{font-size:12.5px;color:var(--muted);font-style:italic;animation:fadeInMsg .3s ease}
@keyframes fadeInMsg{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── INPUT AREA ───────────────────────────── */
.input-area {
  flex-shrink:0;padding:12px 20px 16px;
  background:var(--bg);border-top:1px solid var(--border);
}
.input-box {
  max-width:700px;margin:0 auto;
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:var(--r16);
  box-shadow:var(--sh-sm);
  transition:border-color var(--t),box-shadow var(--t);
  overflow:hidden;
}
.input-box:focus-within{
  border-color:var(--saffron);
  box-shadow:0 0 0 3px var(--saffron-glow),var(--sh-sm);
}
/* File preview */
.file-strip {
  display:none;align-items:center;gap:8px;
  padding:8px 14px;background:var(--saffron-l);
  border-bottom:1px solid var(--border);
}
.file-strip.show{display:flex}
.file-strip-name{flex:1;font-size:12px;color:var(--ink3);font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-strip-rm{background:none;border:none;cursor:pointer;color:var(--red);font-size:16px;padding:0 4px;line-height:1}
/* Textarea */
.chat-input {
  width:100%;border:none;outline:none;resize:none;
  padding:14px 16px 4px;font-size:14px;font-family:var(--font);
  color:var(--ink);background:transparent;
  max-height:180px;line-height:1.55;min-height:50px;
}
.chat-input::placeholder{color:var(--muted2)}
/* Toolbar */
.input-toolbar {
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px 10px;
}
.tool-group{display:flex;align-items:center;gap:3px}
.tool-btn {
  width:34px;height:34px;border-radius:var(--r8);border:none;
  background:transparent;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t);font-family:var(--font);flex-shrink:0;
}
.tool-btn svg{pointer-events:none}
.tool-btn:hover{background:var(--bg2);color:var(--saffron)}
.tool-btn.active{background:var(--saffron-l);color:var(--saffron)}
.tool-btn.listening{background:#fef2f2;color:var(--red);animation:pulse-red 1s infinite}
.tool-btn.speaking-on{background:var(--green-l);color:var(--green)}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(196,32,32,.3)}50%{box-shadow:0 0 0 6px rgba(196,32,32,0)}}
.voice-status-badge{font-size:11px;color:var(--saffron);font-weight:600;
  padding:2px 8px;border-radius:var(--r999);background:var(--saffron-l);
  display:none;white-space:nowrap}
.send-btn {
  width:34px;height:34px;border-radius:var(--r8);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all var(--t);flex-shrink:0;
}
.send-btn.on{background:var(--saffron);color:#fff;box-shadow:0 2px 10px var(--saffron-glow)}
.send-btn.on:hover{background:var(--saffron-d);transform:scale(1.06)}
.send-btn.off{background:var(--bg2);color:var(--muted2);cursor:not-allowed}
.send-btn.stop{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca;cursor:pointer}
.send-btn.stop:hover{background:var(--red);color:#fff}
/* Input footer */
.input-footer{max-width:700px;margin:5px auto 0;text-align:center}
.input-note{font-size:11px;color:var(--muted2)}
.input-note b{color:var(--saffron)}
#voiceStatus{max-width:700px;margin:0 auto 4px;
  font-size:11px;color:var(--saffron);font-weight:600;text-align:center;min-height:14px}

/* ── REFERENCE TAB ───────────────────────── */
.ref-scroll{flex:1;overflow-y:auto;padding:16px 20px;background:var(--bg)}
.ref-scroll::-webkit-scrollbar{width:4px}
.ref-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.ref-inner{max-width:700px;margin:0 auto}
.ref-hint{background:var(--saffron-l);border:1px solid #fed7aa;border-radius:var(--r12);
  padding:11px 14px;margin-bottom:14px;font-size:12.5px;color:#92400e;line-height:1.5}
.ref-filters{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ref-select{width:100%;border:1.5px solid var(--border2);border-radius:var(--r8);
  padding:8px 12px;font-size:13px;color:var(--ink);
  background:var(--surface);font-family:var(--font);outline:none;cursor:pointer;
  transition:border-color var(--t)}
.ref-select:focus{border-color:var(--saffron)}
.ref-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r12);
  overflow:hidden;margin-bottom:8px;box-shadow:var(--sh-sm)}
.ref-card-head{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;
  gap:10px;cursor:pointer;user-select:none;transition:background var(--t)}
.ref-card-head:hover{background:var(--bg2)}
.ref-card-title{font-size:13px;font-weight:700;color:var(--ink)}
.ref-meta{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r999)}
.pill-red{background:var(--red-l);color:var(--red);border:1px solid #fecaca}
.pill-orange{background:var(--saffron-l);color:var(--saffron-d);border:1px solid #fed7aa}
.pill-green{background:var(--green-l);color:var(--green);border:1px solid #bbf7d0}
.pill-violet{background:var(--violet-l);color:var(--violet);border:1px solid #ddd6fe}
.chev{font-size:11px;color:var(--muted2);transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.ref-card-body{display:none;padding:13px 15px;background:var(--bg2);border-top:1px solid var(--border)}
.ref-card-body.open{display:block}
.ref-body-text{font-size:12.5px;color:var(--ink2);line-height:1.85;white-space:pre-wrap;font-family:var(--mono)}

/* Quiz cards */
.quiz-card{background:var(--surface);border:1.5px solid #fed7aa;border-radius:var(--r12);
  padding:16px;max-width:90%;box-shadow:var(--sh-sm)}
.quiz-qnum{font-size:10.5px;font-weight:700;color:var(--saffron);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.quiz-qtext{font-size:13.5px;color:var(--ink);line-height:1.65;margin-bottom:12px;white-space:pre-wrap}
.quiz-options{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.quiz-opt{display:flex;align-items:center;gap:9px;padding:10px 13px;
  border:1.5px solid var(--border2);border-radius:var(--r8);background:var(--bg2);
  cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);
  font-family:var(--font);text-align:left;transition:all var(--t)}
.quiz-opt:hover:not(:disabled){border-color:var(--saffron);background:var(--saffron-l)}
.opt-letter{width:24px;height:24px;border-radius:6px;background:var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.quiz-opt.correct{border-color:var(--green);background:var(--green-l);color:var(--green)}
.quiz-opt.correct .opt-letter{background:var(--green);color:#fff}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-l);color:var(--red)}
.quiz-opt.wrong .opt-letter{background:var(--red);color:#fff}
.quiz-opt.reveal{border-color:var(--green);background:var(--green-l);color:var(--green)}
.quiz-opt:disabled{cursor:default}
.quiz-write-wrap{display:flex;flex-direction:column;gap:7px}
.quiz-write{width:100%;border:1.5px solid var(--border2);border-radius:var(--r8);
  padding:10px 13px;font-size:13px;font-family:var(--font);resize:none;min-height:60px;
  background:var(--bg2);color:var(--ink);outline:none;transition:border-color var(--t)}
.quiz-write:focus{border-color:var(--saffron)}
.quiz-write:disabled{opacity:.5}
.quiz-submit{align-self:flex-end;padding:8px 18px;border-radius:var(--r8);border:none;
  background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;
  font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all var(--t)}
.quiz-submit:hover{transform:scale(1.03)}
.quiz-submit:disabled{background:var(--border2);color:var(--muted);cursor:default;transform:none}

/* ── RIGHT PANEL — diagram canvas ─────────── */
.canvas-panel {
  width:340px;flex-shrink:0;

}
.canvas-header {

/* ── FILE UPLOAD HANDLER ───────────────────────────── */
function handleUpload(evt){
  const file=evt.target.files[0];
  if(!file) return;
  if(file.size > 10*1024*1024){
    alert('File too large (max 10MB). Please use a smaller image or PDF.');
    return;
  }
  uploadedFile=file;
  uploadedMimeType=file.type;
  const reader=new FileReader();
  reader.onload=(e)=>{
    uploadedDataUrl=e.target.result;
    document.getElementById('uploadPreview').style.display='flex';
    const name=file.name.length>30?file.name.substring(0,28)+'…':file.name;
    document.getElementById('uploadName').textContent='📄 '+name;
  };
  reader.readAsDataURL(file);
  evt.target.value=''; // reset so same file can be re-selected
}
function clearUpload(){
  uploadedFile=null; uploadedDataUrl=null; uploadedMimeType=null;
  document.getElementById('uploadPreview').style.display='none';
}

// ── RATE LIMITING HELPERS ─────────────────────────────────────
function getRateLimitKey(){
  const fp=getFingerprint();
  return 'vidya_req_'+fp+'_'+new Date().toISOString().slice(0,10);
}
function getFingerprint(){
  if(_fingerprint) return _fingerprint;
  const p=[navigator.language,navigator.platform,
    screen.width+'x'+screen.height,screen.colorDepth,
    new Date().getTimezoneOffset(),navigator.hardwareConcurrency||''].join('|');
  let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}
  return _fingerprint='fp_'+Math.abs(h).toString(36);
}
function getUserRequestCount(){try{return parseInt(localStorage.getItem(getRateLimitKey())||'0');}catch(e){return 0;}}
function incrementUserRequestCount(){try{const k=getRateLimitKey(),c=getUserRequestCount()+1;localStorage.setItem(k,c);return c;}catch(e){return 0;}}
function getRemainingRequests(){return Math.max(0,USER_DAILY_LIMIT-getUserRequestCount());}
function isGeminiModel(){return CURRENT_MODEL.includes('gemini');}
function checkRateLimit(){
  if(!isGeminiModel()) return true;
  if(getUserRequestCount()>=USER_DAILY_LIMIT){
    addBubble('bot','⏰ You have used all '+USER_DAILY_LIMIT+' questions for today! Come back tomorrow 😊 See you, '+STU_NAME+'!');
    return false;
  }
  return true;
}
function updateRequestBadge(){
  const el=document.getElementById('reqBadge');
  const rc=document.getElementById('reqCount');
  const rem=getRemainingRequests();
  if(el&&isGeminiModel()){
    el.style.display='inline-block';
    el.textContent=rem+'/'+USER_DAILY_LIMIT+' left';
    el.style.background=rem<=5?'#fef2f2':rem<=10?'#fffbeb':'#f0fdf4';
    el.style.color=rem<=5?'#dc2626':rem<=10?'#d97706':'#1a7a3c';
    el.style.borderColor=rem<=5?'#fecaca':rem<=10?'#fde68a':'#bbf7d0';
  }
  if(rc) rc.textContent=rem>0?rem+' questions left today':'No questions left today';
}

function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function resizeTA(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function updateSend(){
  const v=document.getElementById('chatInput').value.trim();
  const hasFile=!!uploadedDataUrl;
  const btn=document.getElementById('sendBtn');
  if(!btn) return;
  if(loading){
    btn.className='send-btn stop';
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>';
    btn.onclick=stopGeneration;
  } else {
    btn.className=(v||hasFile)?'send-btn on':'send-btn off';
    btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>';
    btn.onclick=sendMsg;
  }
}

function stopGeneration(){
  if(_abortCtrl){try{_abortCtrl.abort();}catch(e){}_abortCtrl=null;}
  // Clear typing indicators immediately
  Object.keys(_typingTimers||{}).forEach(id=>{
    clearInterval(_typingTimers[id]);delete _typingTimers[id];
    const el=document.getElementById(id);if(el)el.remove();
  });
  loading=false;updateSend();
}

 // stores last message for quota retry

async function sendMsg(retryMsg){
  const ta=document.getElementById('chatInput');
  const txt=retryMsg||ta.value.trim();
  // Guard: no message, no file, or already loading
  if((!txt&&!uploadedDataUrl&&!retryMsg)||loading) return;

  // Rate limit check — only on fresh messages
  if(!retryMsg){
    if(!checkRateLimit()) return;
    _lastUserMsg=txt;
  }

  // Show user bubble
  const displayTxt=txt||(uploadedDataUrl?'(File attached)':'');
  const hasFile=!!uploadedDataUrl;
  if(!retryMsg) addBubble('user', displayTxt+(hasFile?'\n📎 [File attached]':''));

  // Build API parts
  const userParts=[];
  if(hasFile){
    const base64Data=uploadedDataUrl.split(',')[1];
    const mimeType=uploadedMimeType||'image/jpeg';
    userParts.push({inlineData:{mimeType,data:base64Data}});
  }
  if(txt){
    userParts.push({text:txt+(hasFile?'\n\n[File uploaded — analyse for SSLC 2025-26 Karnataka Board.]':'')});
  } else if(hasFile){
    userParts.push({text:'Analyse this file for SSLC 2025-26 Class 10 Karnataka Board. What type of document is this? What are the key topics or questions?'});
  }
  if(!retryMsg) history.push({role:'user',parts:userParts});
  if(hasFile) clearUpload();

  ta.value=''; ta.style.height='auto'; updateSend();
  loading=true; updateSend();
  const tid=showTyping();

  try{
    _abortCtrl=new AbortController();
    const resp=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${CURRENT_MODEL}:generateContent?key=${GEM_KEY}`,
      {method:'POST',headers:{'Content-Type':'application/json'},signal:_abortCtrl.signal,
       body:JSON.stringify({
         system_instruction:{parts:[{text:sysPrompt()}]},
         contents:history,
         generationConfig:{temperature:0.5,maxOutputTokens:800,topP:0.9}
       })}
    );
    hideTyping(tid);
    if(!resp.ok){
      let eBody={};
      try{eBody=await resp.json();}catch(pe){}
      const errMsg=eBody?.error?.message||eBody?.error?.status||'HTTP '+resp.status;
      console.error('Vidya API HTTP Error:', resp.status, errMsg, eBody);
      throw new Error(errMsg);
    }
    const d=await resp.json();
    const reply=d.candidates?.[0]?.content?.parts?.[0]?.text||"I couldn't get a response. Try again!";
    history.push({role:'model',parts:[{text:reply}]});
    addBubble('bot',reply);
    // Only count after successful response
    if(!retryMsg){ incrementUserRequestCount(); updateRequestBadge(); }
    if(isDiagramRequest(txt||_lastUserMsg||'')) showDiagramLinks((txt||_lastUserMsg||'')+' '+SUBJECT);
    saveSession();
  }catch(err){
    hideTyping(tid);
    console.error('Vidya API Error:', err);
    const msg=err.message||'';
    const isAbort=err.name==='AbortError'||msg.toLowerCase().includes('abort');
    if(isAbort){
      Object.keys(_typingTimers||{}).forEach(id=>{
        clearInterval(_typingTimers[id]);delete _typingTimers[id];
        const el=document.getElementById(id);if(el)el.remove();
      });
      loading=false;updateSend();return;
    }
    const isQuota=msg.includes('quota')||msg.includes('RESOURCE_EXHAUSTED')||msg.includes('429');
    if(!isQuota) history.pop();
    let friendly='';
    if(msg.includes('API_KEY_INVALID')||msg.includes('API key'))
      friendly="🔑 API key problem. Please contact your teacher!";
    else if(isQuota){
      if(KEYS.length>1){
        GEM_KEY=getNextKey();loading=false;
        if(_lastUserMsg) setTimeout(()=>sendMsg(_lastUserMsg),800);
        return;
      } else friendly="⏳ Too many requests! Wait a minute and try again 😊";
    }
    else if(msg.includes('SAFETY')||msg.includes('safety'))
      friendly="🛡️ That was blocked by the safety filter. Try rephrasing!";
    else if(msg.includes('fetch')||msg.includes('Failed to fetch'))
      friendly="🌐 No internet connection. Check your WiFi!";
    else
      friendly="😕 Something went wrong. Please try again!";
    if(friendly) addBubble('bot', friendly + '<br><small style="opacity:.6">(' + msg.slice(0,80) + ')</small>');
    else addBubble('bot', '😕 Error: ' + msg.slice(0,120));
  }
  loading=false; updateSend();
}

THE #1 RULE: ASK ONE QUESTION. WAIT. EVALUATE. THEN ASK THE NEXT.
NEVER ask 2 or more questions in the same message.
NEVER dump a list of questions. ONE question at a time. Always.

THE QUIZ FLOW (repeat for every single question):

TURN 1 — YOU ASK:
  • Show the questions the student asked for (1 or multiple, whatever they requested)
  • For EACH question, use this EXACT FORMAT so the UI can render interactive answer boxes:

  For MCQ questions:
    Q1: [question text]
    Chapter: [chapter name] | [X] marks
    A) [option text]
    B) [option text]
    C) [option text]
    D) [option text]

  For written/short answer questions:
    Q1: [question text]
    Chapter: [chapter name] | [X] marks
    (leave blank — the UI adds a text box automatically)

  For calculation/long answer:
    Q1: [question text]
    Chapter: [chapter name] | [X] marks
    (leave blank — the UI adds a text box automatically)

  • Number each question: Q1:, Q2:, Q3: etc.
  • Do NOT add "Answer:" or the solution — wait for the student to answer
  • After listing all questions, just say: "Answer each question above — type or click your answer! 🎯"
  • STOP. Wait for student answers.

TURN 2 — STUDENT ANSWERS. YOU EVALUATE:
  • Compare their answer to the correct answer
  • CORRECT: 
      - Celebrate: "🎉 Correct! Well done!"
      - Show the model answer (how to write it for full marks in the exam)
      - For Maths: show every step with marks: "Step 1 (1m): ... Step 2 (1m): ..."
      - Say: "✅ You'd get [X]/[X] marks for that answer!"
  • PARTIALLY CORRECT:
      - Say: "Good start! You got [X]/[X] marks. Here's what was missing:"
      - Show exactly what the complete answer needs
  • WRONG:
      - Say gently: "Not quite — here's the correct answer:"
      - Show the full model answer
      - Explain WHY this is the answer (the concept behind it)
  • After evaluating, ALWAYS show:
      ⚠️ Common mistake: [what students usually get wrong here]
  • Then ask: "Ready for the next question? 🎯" and WAIT for them to say yes.

TURN 3 — STUDENT SAYS READY. YOU ASK THE NEXT QUESTION.
  • Only ONE new question. Repeat the cycle.

SUBJECT-SPECIFIC QUIZ RULES:

FOR MATHEMATICS:
  Format every question like:
    ✏️ **Question [N]:** [question text]
    📌 Chapter: [name] | Worth: [X] marks | Type: [short answer/proof/calculation]
    "Take your time — type your answer or working below! ✍️"
  After answer, show:
    ∴ **Model Answer:**
    Step 1 — [label]: [calculation] → (1m)
    Step 2 — [label]: [calculation] → (1m)
    ∴ Answer = [result with units] → (1m)
    🎯 Marks: [X]/[X]
    ⚠️ Common mistake: [what students get wrong]

FOR SCIENCE:
  Mix question types: MCQ / fill-in-blank / give equation / define / explain
  For numericals: student must show formula + substitution + answer
  After answer show: correct answer + concept explanation + marks breakdown

FOR SOCIAL SCIENCE:
  Questions should be point-wise (e.g. "Give 3 causes of...")
  Student answers in points; you check each point and give marks per point
  Show: "Your answer: X/[total] points correct. Full model answer: ..."

FOR ENGLISH:
  Mix: comprehension / grammar / figure of speech / theme question
  For grammar: student gives example; you check rule + usage
  For RTC: student gives context; you check if they got speaker/context/significance

IMPORTANT: If student says "give me all 5 questions" or "quiz me on 10 topics at once":
  Politely say: "I'll quiz you one at a time — it's more effective! 
  Here's Question 1:" and proceed with ONE question only.

` : '';

  const allSubjNote = SUBJECT==='All Subjects' ? `
ALL SUBJECTS MODE: Answer any Class 10 SSLC 2025-26 question across all subjects.
Auto-detect which subject is being asked. Label answers: 🔢 Maths: / 🔬 Science: / 🌍 Social: / 📖 English: etc.
Never redirect — just answer everything confidently.
` : '';

  return `You are "Vidya" 🎓 — a warm, expert AI tutor for Karnataka SSLC Class 10 students (2025-26).
Student: ${STU_NAME}. Use their name naturally (not every message).

SCOPE: Karnataka DSERT/KTBS Class 10 SSLC 2025-26 ONLY.
${allSubjNote}

// Quiz answer submission — called by inline card buttons
function submitQuizAnswer(cardId, answerText){
  const card = document.getElementById(cardId);
  if(!card) return;
  const textarea = card.querySelector('.quiz-write');
  const submitBtn = card.querySelector('.quiz-submit');
  const result = card.querySelector('.quiz-result');
  const nextBtn = card.querySelector('.quiz-next');
  const answer = answerText || (textarea && textarea.value.trim()) || '';
  if(!answer) return;

  // Disable inputs
  if(textarea) { textarea.disabled = true; }
  if(submitBtn) { submitBtn.disabled = true; }
  card.classList.remove('active');
  card.classList.add('answered');

  // Show answer in chat as user bubble
  addBubble('user', answer);
  history.push({role:'user', parts:[{text: answer}]});

  // Build evaluation prompt
  const qtext = card.querySelector('.quiz-qtext').innerText;
  const chapter = card.querySelector('.quiz-chapter') ? card.querySelector('.quiz-chapter').innerText : '';
  const evalPrompt = 'My answer to the question "' + qtext + '" is: ' + answer +
    (correctAnswer ? '\n[Correct answer hint: ' + correctAnswer + ']' : '');

  // Show loading then get AI evaluation
  loading = true;
  fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/${CURRENT_MODEL}:generateContent?key=' + GEM_KEY,
    {method:'POST', headers:{'Content-Type':'application/json'},
     body: JSON.stringify({
       system_instruction: {parts:[{text: sysPrompt()}]},
       contents: [...history, {role:'user', parts:[{text: evalPrompt}]}],
       generationConfig: {temperature:0.7, maxOutputTokens:800}
     })}
  ).then(r => r.json()).then(d => {
    hideTyping(tid);
    loading = false;
    const reply = d.candidates?.[0]?.content?.parts?.[0]?.text || 'Could not evaluate. Try again!';
    history.push({role:'model', parts:[{text: reply}]});
    addBubble('bot', reply);
  }).catch(err => {
    hideTyping(tid);
    loading = false;
    const qmsg = err.message||'';
    const qfriendly = qmsg.includes('quota')||qmsg.includes('429')
      ? '⏳ Too many requests! Wait a moment and try again 😊'
      : qmsg.includes('fetch')||qmsg.includes('network')
      ? '🌐 No internet connection. Check your WiFi!'
      : '😕 Something went wrong evaluating your answer. Try again!';
    addBubble('bot', qfriendly);
  });
}

// MCQ option click
function selectMCQ(cardId, chosen, correct){
  if(!card) return;
  const opts = card.querySelectorAll('.quiz-opt');
  opts.forEach(o => {
    o.disabled = true;
    const letter = o.dataset.letter;
    if(letter === correct) o.classList.add('reveal');
    if(letter === chosen && chosen !== correct) o.classList.add('wrong');
    if(letter === chosen && chosen === correct) o.classList.add('correct');
  });
  card.classList.remove('active');
  card.classList.add('answered');
  submitQuizAnswer(cardId, answer);
}

// Parse bot response and render quiz cards + regular text
function addBubble(role,text){
  const inner=document.getElementById('msgsInner');
  if(role==='bot'&&MODE==='quiz'){
    const rendered=renderQuizMessage(text,inner);
    if(rendered){scrollChat();return;}
  }
  const row=document.createElement('div');
  row.className='msg-row '+role;
  if(role==='bot'){
    row.innerHTML='<div class="bot-av">🤖</div>'
      +'<div class="msg-content">'
        +'<div class="msg-sender">Vidya</div>'
        +'<div class="msg-text">'+formatMsg(text,'bot')+'</div>'
        +'<div class="msg-actions">'
          +'<button class="msg-action-btn" onclick="navigator.clipboard.writeText(this.closest(\'.msg-content\').querySelector(\'.msg-text\').innerText)">📋 Copy</button>'
          +'<button class="msg-action-btn" onclick="speakText(this.closest(\'.msg-content\').querySelector(\'.msg-text\').innerText)">🔊 Speak</button>'
        +'</div>'
      +'</div>';
  } else {
    row.innerHTML='<div class="user-msg-wrap"><div class="user-bubble">'+escHtml(text)+'</div></div>';
  }
  inner.appendChild(row);scrollChat();
  if(role==='bot'&&AUTO_SPEAK&&typeof speakText==='function') speakText(text);
}

// Renders quiz question cards inline — returns true if any cards were rendered
function renderQuizMessage(text, inner){
  const hasMCQOptions = /\nA\)/.test(text) || /\n\(A\)/.test(text);
  const qMatches = text.match(/Q\s*\d+:/gim) || [];
  const hasQNum   = qMatches.length >= 1;
  if(!hasMCQOptions && !hasQNum) return false;

  const questions = parseQuizQuestions(text);
  if(!questions.length) return false;

  if(questions[0].preText && questions[0].preText.trim()){
    const prow = document.createElement('div');
    prow.className = 'msg-row bot';
    prow.innerHTML = '<div class="bot-av">🤖</div><div class="bubble bot">' + formatMsg(questions[0].preText,'bot') + '</div>';
    inner.appendChild(prow);
  }

  questions.forEach((q, idx) => {
    row.className = 'msg-row bot';
    const cardId = 'qcard_' + (++_qcardId);

    let c = '<div class="quiz-card active" id="' + cardId + '">';
    c += '<div class="quiz-qnum">Q' + (idx+1)
       + (q.chapter ? ' &nbsp;·&nbsp; ' + escHtml(q.chapter) : '')
       + (q.marks   ? ' &nbsp;·&nbsp; ' + escHtml(q.marks)   : '')
       + '</div>';
    c += '<div class="quiz-qtext">' + formatMsg(q.question,'bot') + '</div>';

    if(q.options && q.options.length){
      c += '<div class="quiz-options">';
      q.options.forEach(opt => {
        c += '<button class="quiz-opt"'
           + ' data-letter="' + escHtml(opt.letter) + '"'
           + ' data-text="'   + escHtml(opt.text)   + '"'
           + ' onclick="selectMCQ(\'' + cardId + '\',\'' + opt.letter + '\',\'\')">'
           + '<span class="opt-letter">' + escHtml(opt.letter) + '</span>'
           + escHtml(opt.text)
           + '</button>';
      });
      c += '</div>';
    } else {
      c += '<div class="quiz-write-wrap">'
         + '<textarea class="quiz-write" placeholder="Write your answer here…" rows="3"'
         + ' onkeydown="if(event.ctrlKey&&event.key===\'Enter\'){event.preventDefault();submitQuizAnswer(\'' + cardId + '\',this.value)}"'
         + '></textarea>'
         + '<button class="quiz-submit" onclick="submitQuizAnswer(\'' + cardId + '\',document.getElementById(\'' + cardId + '\').querySelector(\'.quiz-write\').value)">Submit ↑</button>'
         + '</div>';
    }
    c += '</div>';
    row.innerHTML = '<div class="bot-av">🤖</div><div class="msg-content"><div class="msg-sender">Vidya — Quiz</div>' + c + '</div>';
    inner.appendChild(row);
  });

  const lastQ = questions[questions.length-1];
  if(lastQ.postText && lastQ.postText.trim()){
    prow.className = 'msg-row bot';
    prow.innerHTML = '<div class="bot-av">🤖</div><div class="bubble bot">' + formatMsg(lastQ.postText,'bot') + '</div>';
    inner.appendChild(prow);
  }
  return true;
}


function parseQuizQuestions(text){
  const lines = text.split('\n');
  let current = null;
  let preText  = '';
  let postLines = [];
  let state = 'pre';

  const isQStart = l => /^Q\s*\d+:/i.test(l.trim());
  const isOption = l => /^\s*[A-D]\)\s/.test(l);
  const optLetter = l => (l.trim().match(/^([A-D])\)/) || ['','?'])[1];
  const optText   = l => l.trim().replace(/^[A-D]\)\s*/,'').trim();

  for(let i=0; i<lines.length; i++){
    const l = lines[i];
    if(isQStart(l)){
      if(current){ current.postText = ''; questions.push(current); }
      const chM = l.match(/Chapter:?\s*([^|\n]+)/i);
      const mM  = l.match(/(\d+)\s*marks?/i);
      const qTxt = l.replace(/^Q\s*\d+:\s*/i,'').trim();
      current = {
        question: qTxt,
        options:  [],
        chapter:  chM ? chM[1].trim() : null,
        marks:    mM  ? mM[1]+' marks' : null,
        preText:  questions.length===0 ? preText : '',
        postText: ''
      };
      state = 'question';
    } else if(state==='question' && isOption(l)){
      state = 'options';
      current.options.push({letter:optLetter(l), text:optText(l)});
    } else if(state==='options' && isOption(l)){
      current.options.push({letter:optLetter(l), text:optText(l)});
    } else if(state==='question' && current && l.trim()){
      current.question += '\n' + l;
    } else if(state==='pre'){
      preText += l + '\n';
    }
  }
  if(current) questions.push(current);
  return questions;
}


function formatMsg(txt,role){
  if(role==='user') return escHtml(txt);
  // Rich markdown rendering for bot messages
  let h = String(txt);

  // Escape HTML first (but protect markers)
  h = h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // Code blocks (``` ... ```)
  h = h.replace(/```([\s\S]*?)```/g, (m,c)=>
    '<pre style="background:#1e1e2e;color:#cdd6f4;padding:12px 14px;border-radius:10px;overflow-x:auto;font-size:12.5px;margin:8px 0;font-family:monospace;line-height:1.6">'+c.trim()+'</pre>');

  // Inline code
  h = h.replace(/`([^`\n]+)`/g,'<code>$1</code>');

  // Bold
  h = h.replace(/\*\*(.+?)\*\*/gs,'<strong>$1</strong>');

  // Italic
  h = h.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');

  // Headers (## or ###)
  h = h.replace(/^#{3} (.+)$/gm,'<div style="font-size:13px;font-weight:800;color:var(--saffron);margin:10px 0 4px;text-transform:uppercase;letter-spacing:0.04em">$1</div>');
  h = h.replace(/^#{2} (.+)$/gm,'<div style="font-size:15px;font-weight:900;color:var(--gray-800);margin:12px 0 5px;border-bottom:1.5px solid var(--gray-100);padding-bottom:4px">$1</div>');
  h = h.replace(/^#{1} (.+)$/gm,'<div style="font-size:16px;font-weight:900;color:var(--gray-800);margin:12px 0 6px">$1</div>');

  // Horizontal rule
  h = h.replace(/^---+$/gm,'<hr style="border:none;border-top:1.5px solid var(--gray-200);margin:10px 0"/>');

  // Bullet points (- or •)
  h = h.replace(/^[\-•] (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0"><span style="color:var(--saffron);font-weight:900;flex-shrink:0;margin-top:1px">•</span><span>$1</span></div>');

  // Numbered list lines (1. 2. etc)
  h = h.replace(/^(\d+)\. (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0"><span style="background:var(--saffron-light);color:var(--saffron);font-weight:800;min-width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px">$1</span><span>$2</span></div>');

  // Step labels: "Step N — " or "✏️ Step N:"
  h = h.replace(/(\*\*Step \d+[^*]*\*\*:?)/g,'<span style="color:var(--saffron);font-weight:800">$1</span>');

  // Checkmark lines
  h = h.replace(/^[✅✓] (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0;color:#166534"><span>✅</span><span>$1</span></div>');
  h = h.replace(/^[❌✗] (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0;color:#dc2626"><span>❌</span><span>$1</span></div>');

  // Arrow lines (→ or →)
  h = h.replace(/^  →(.+)$/gm,'<div style="margin:2px 0 2px 16px;color:var(--gray-600);font-family:var(--font-mono);font-size:13px">→$1</div>');

  // Newlines to br
  h = h.replace(/\n/g,'<br>');

  return h;
}

    msgIdx = (msgIdx+1) % msgs.length;

  return id;
}
function hideTyping(id){
  // Clear rotating message timer
  if(_typingTimers[id]){
    clearInterval(_typingTimers[id]);
    delete _typingTimers[id];

  if(e)e.remove();
}

const CAT_ICON ={formula:'📐',chapter:'📚',dates:'📅',tips:'💡',blueprint:'📊'};
const SUBJ_ICON={Mathematics:'🔢',Science:'🔬','Social Science':'🌍',English:'📖',Hindi:'🇮🇳',Kannada:'🌿'};
const MARKS_COLOR={'8m — HIGHEST':'pill-red','9m — HIGHEST':'pill-red','7m':'pill-orange','8m':'pill-red','6m':'pill-orange','(part of Ch9)':'pill-violet'};

function renderRef(){
  const fS=document.getElementById('refSubj').value;
  const fC=document.getElementById('refCat').value;
  const container=document.getElementById('refCards');

  const items=REF.filter(r=>(!fS||r.s===fS)&&(!fC||r.c===fC));
  if(!items.length){
    container.innerHTML=`<div class="ref-empty"><div>🔍</div><p>No items match your filter.<br>Try a different subject or category.</p></div>`;
    return;
  }

  // Group by subject
  const bySubj={};
  items.forEach(r=>{
    if(!bySubj[r.s])bySubj[r.s]=[];
    bySubj[r.s].push(r);
  });

  let html='';
  Object.entries(bySubj).forEach(([subj,arr])=>{
    html+=`<div class="ref-section"><div class="ref-section-title">${SUBJ_ICON[subj]||'📚'} ${subj}</div>`;
    arr.forEach((r,i)=>{
      const id=`rc_${subj.replace(/\s/g,'_')}_${i}`;
      const pillClass=MARKS_COLOR[r.marks]||'pill-green';
      const marksPill=r.marks?`<span class="pill ${pillClass}">${r.marks}</span>`:'';
      const catPill=`<span class="pill pill-orange">${CAT_ICON[r.c]} ${r.c}</span>`;
      const bodyHtml=formatRefBody(r.body);
      html+=`<div class="ref-card">
        <div class="ref-card-head" onclick="toggleCard('${id}')">
          <div class="ref-card-title">${r.title}</div>
          <div class="ref-card-meta">${marksPill}${catPill}<span class="chevron" id="ch_${id}">▾</span></div>
        </div>
        <div class="ref-card-body${r.c==='blueprint'?' open':''}" id="${id}"><div class="ref-body-text">${bodyHtml}</div></div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

function toggleCard(id){
  const body=document.getElementById(id);
  const chev=document.getElementById('ch_'+id);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  if(chev)chev.classList.toggle('open',!isOpen);
}

function formatRefBody(text){
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/⭐/g,'<span class="hi">⭐</span>');
}

// ── PROGRESS TRACKING ────────────────────
function getProgress(){
  try{const p=JSON.parse(localStorage.getItem('vidya_progress')||'{}');
    return Object.assign({total:0,correct:0,wrong:0,streak:0,best:0,subjects:{}},p);
  }catch(e){return{total:0,correct:0,wrong:0,streak:0,best:0,subjects:{}};}
}
function saveProgress(p){try{localStorage.setItem('vidya_progress',JSON.stringify(p));}catch(e){}}
function recordAnswer(isCorrect,subject){
  const p=getProgress();const s=subject||SUBJECT||'All Subjects';
  if(!p.subjects[s])p.subjects[s]={correct:0,wrong:0};
  p.total++;
  if(isCorrect){p.correct++;p.subjects[s].correct++;p.streak=(p.streak||0)+1;if(p.streak>p.best)p.best=p.streak;}
  else{p.wrong++;p.subjects[s].wrong++;p.streak=0;}
  saveProgress(p);updateProgressBadge();
}
function updateProgressBadge(){
  const p=getProgress();if(!p.total)return;
  const acc=Math.round((p.correct/p.total)*100);
  const el=document.getElementById('progressBadge');
  if(el){el.style.display='inline-block';el.textContent='🎯 '+acc+'% · 🔥'+p.streak;}
}

function showProgressDashboard(){
  const panel=document.getElementById('progressPanel');
  if(!panel) return;
  if(panel.classList.contains('open')){panel.classList.remove('open');return;}
  const p=getProgress();
  if(!p.total){
    panel.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);padding:20px;text-align:center"><div style="font-size:40px">📊</div><div style="font-size:14px;font-weight:700;color:var(--ink)">No progress yet!</div><div style="font-size:12px;line-height:1.6">Answer quiz questions to track your stats.</div><button onclick="document.getElementById(\'progressPanel\').classList.remove(\'open\')" style="margin-top:12px;padding:8px 16px;border-radius:999px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-family:inherit;font-size:12px">Close</button></div>';
    panel.classList.add('open');return;
  }
  const acc=Math.round((p.correct/p.total)*100);
  const col=acc>=80?'var(--green)':acc>=60?'#d97706':'var(--red)';
  let strong='-',weak='-',maxC=-1,maxW=-1;
  for(const s in p.subjects){
    const{correct,wrong}=p.subjects[s];
    if(correct>maxC){maxC=correct;strong=s;}
    if(wrong>maxW){maxW=wrong;weak=s;}
  }
  const rows=Object.entries(p.subjects)
    .sort(([,a],[,b])=>(b.correct+b.wrong)-(a.correct+a.wrong)).slice(0,6)
    .map(([s,d])=>{
      const t=d.correct+d.wrong,pct=t?Math.round(d.correct/t*100):0;
      const c=pct>=70?'var(--green)':pct>=50?'#d97706':'var(--red)';

async function generateDiagram(query){
  const out=document.getElementById('diagramOutput');if(!out)return;
  out.innerHTML='<div class="canvas-loading"><div style="font-size:28px">🎨</div><div style="font-size:13px;font-weight:600">Drawing '+escHtml(query)+'...</div><div style="display:flex;gap:5px"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
  const prompt='Draw a detailed labeled diagram of "'+query+'" for Karnataka Class 10 SSLC. Use ASCII art and Unicode box-drawing characters. Label ALL parts with arrows. Put diagram in a code block. Then list parts with descriptions.';
  try{
    const resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+GEM_KEY,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({
         system_instruction:{parts:[{text:'You draw clear ASCII/Unicode educational diagrams for Indian students.'}]},
         contents:[{role:'user',parts:[{text:prompt}]}],
         generationConfig:{temperature:0.3,maxOutputTokens:1500}
       })});
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e?.error?.message||'HTTP '+resp.status);}
    const data=await resp.json();
    const diagram=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(!diagram) throw new Error('No response');
    out.innerHTML='<div class="diagram-result">'
      +'<div class="diagram-result-title">📐 '+escHtml(query)+'</div>'
      +'<div class="diagram-text">'+formatMsg(diagram,'bot')+'</div>'
      +'<div class="diagram-actions">'
        +'<button class="d-action-btn" onclick="navigator.clipboard.writeText(document.getElementById(\'diagramOutput\').innerText)">📋 Copy</button>'
        +'<button class="d-action-btn" onclick="askNewDiagram()">🎨 New</button>'
      +'</div>'
      +'</div>';
  }catch(e){
    out.innerHTML='<div class="diagram-result">'
      +'<div style="color:var(--red);font-size:13px;margin-bottom:10px">❌ '+escHtml(e.message||'Error')+'</div>'
      +'<button class="d-action-btn" onclick="generateDiagram('+JSON.stringify(query)+')">🔄 Try Again</button>'
      +'</div>';
  }
}

function askNewDiagram(){
  const q=prompt('What diagram? (e.g. nephron, reflex arc, heart)');

}

// ── VOICE INPUT (Speech to Text) ─────────────────────────────────
let recognition = null;
let isListening = false;
let isSpeaking = false;
let speechSynthesis = window.speechSynthesis;

function initVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    document.getElementById('micBtn').style.opacity = '0.3';
    document.getElementById('micBtn').title = 'Voice not supported in this browser';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'en-IN'; // Indian English
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    btn.classList.add('listening');
    setVoiceStatus('🔴 Listening… speak now');
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      if(e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const input = document.getElementById('chatInput');
    input.value = final || interim;
    resizeTA(input);
    updateSend();
    if(final) setVoiceStatus('✅ Got it! Press Send or keep speaking');
    else setVoiceStatus('🎤 ' + interim);
  };

  recognition.onerror = (e) => {
    setVoiceStatus(e.error === 'no-speech' ? '🔇 No speech detected' : '❌ ' + e.error);
    resetMicBtn();
  };

  recognition.onend = () => {
    isListening = false;
    resetMicBtn();
    // Auto-send if there's text
    const val = document.getElementById('chatInput').value.trim();
    if(val) setTimeout(()=>{ setVoiceStatus(''); sendMsg(); }, 500);
    else setVoiceStatus('');
  };
}

function toggleVoiceInput(){
  if(!recognition){ initVoice(); }
  if(!recognition){ alert('Voice input not supported in this browser. Try Chrome or Safari.'); return; }
  if(isListening){
    recognition.stop();
  } else {
    // Stop any ongoing speech
    if(isSpeaking) stopSpeaking();
    document.getElementById('chatInput').value = '';
    updateSend();
    recognition.start();
  }
}

function resetMicBtn(){
  isListening = false;
  if(btn) btn.classList.remove('listening');
}

function setVoiceStatus(msg){
  const el=document.getElementById('voiceStatus');
  if(el) el.textContent=msg;
  const ei=document.getElementById('voiceStatusInline');
  if(ei){ei.textContent=msg;ei.style.display=msg?'inline-flex':'none';}
}

// ── AI SPEAK (Text to Speech) ─────────────────────────────────────
function speakText(text){
  if(!window.speechSynthesis) return;
  // Clean markdown from text before speaking
  const clean = text
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/\*(.*?)\*/g,'$1')
    .replace(/`([^`]*)`/g,'$1')
    .replace(/#{1,3} /g,'')
    .replace(/<[^>]+>/g,'')
    .replace(/\[c\]|\[\/c\]/g,'')
    .replace(/[✅❌⚠️🎉🎯📚🔬🌍📖🇮🇳🌿🕉️🌟🔢]/g,'')
    .trim();

  if(!clean) return;
  stopSpeaking();

  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.lang = 'en-IN';
  utterance.rate = 0.95;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;

  // Pick a good voice if available
  const vv=speechSynthesis.getVoices();
  const pref=vv.find(v=>/priya|aditi|lekha|raveena|neerja/i.test(v.name)&&/en-IN/i.test(v.lang))||vv.find(v=>/en-IN/i.test(v.lang))||vv.find(v=>/en-GB/i.test(v.lang));
  if(pref) utterance.voice=pref;

  utterance.onstart = () => {
    isSpeaking = true;
    setVoiceStatus('🔊 Speaking… tap 🔇 to stop');
  };
  utterance.onend = () => {
    isSpeaking = false;
    setVoiceStatus('');
  };
  utterance.onerror = () => {
    isSpeaking = false;
    setVoiceStatus('');
  };

  speechSynthesis.speak(utterance);
}

function stopSpeaking(){
  if(speechSynthesis) speechSynthesis.cancel();
  isSpeaking = false;
  setVoiceStatus('');
}
